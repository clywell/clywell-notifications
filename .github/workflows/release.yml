name: Release & Package

on:
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  # ============================================================
  # Validate and Build
  # ============================================================
  validate-build:
    runs-on: ubuntu-latest
    name: Validate & Build Release
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract Version from version.json
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "❌ Failed to extract version from version.json"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Version extracted from version.json: ${VERSION}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Run tests
        run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --logger "console;verbosity=minimal"

  # ============================================================
  # Package
  # ============================================================
  package:
    runs-on: ubuntu-latest
    name: Create NuGet Packages
    needs: validate-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Create NuGet packages
        run: |
          PACK_ARGS="-c ${{ env.BUILD_CONFIGURATION }} --no-restore -p:Version=${{ needs.validate-build.outputs.version }} -p:PackageVersion=${{ needs.validate-build.outputs.version }} -o ./artifacts"
          
          dotnet pack $PACK_ARGS src/Clywell.Core.Notifications/Clywell.Core.Notifications.csproj
          echo "✓ Clywell.Core.Notifications packed"
          
          dotnet pack $PACK_ARGS src/Clywell.Core.Notifications.Smtp/Clywell.Core.Notifications.Smtp.csproj
          echo "✓ Clywell.Core.Notifications.Smtp packed"
          
          dotnet pack $PACK_ARGS src/Clywell.Core.Notifications.Renderer.Scriban/Clywell.Core.Notifications.Renderer.Scriban.csproj
          echo "✓ Clywell.Core.Notifications.Renderer.Scriban packed"
          
          dotnet pack $PACK_ARGS src/Clywell.Core.Notifications.SignalR/Clywell.Core.Notifications.SignalR.csproj
          echo "✓ Clywell.Core.Notifications.SignalR packed"
          
          dotnet pack $PACK_ARGS src/Clywell.Core.Notifications.Sse/Clywell.Core.Notifications.Sse.csproj
          echo "✓ Clywell.Core.Notifications.Sse packed"
          
          echo "All packages:"
          ls -la ./artifacts/*.nupkg

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 30

  # ============================================================
  # Publish to NuGet
  # ============================================================
  publish-nuget:
    runs-on: ubuntu-latest
    name: Publish to NuGet
    needs: [validate-build, package]

    steps:
      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push \
            *.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}

  # ============================================================
  # Create GitHub Release
  # ============================================================
  github-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: [validate-build, package]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v7
        with:
          name: nuget-packages
          path: ./release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-build.outputs.version }}
          name: Release ${{ needs.validate-build.outputs.version }}
          files: ./release-assets/**
          draft: false
          prerelease: ${{ contains(needs.validate-build.outputs.version, '-') }}
          body: |
            ## Clywell.Core.Notifications v${{ needs.validate-build.outputs.version }}
            
            ### Release Artifacts
            - `Clywell.Core.Notifications.${{ needs.validate-build.outputs.version }}.nupkg` - Core package
            - `Clywell.Core.Notifications.Smtp.${{ needs.validate-build.outputs.version }}.nupkg` - SMTP email channel
            - `Clywell.Core.Notifications.Renderer.Scriban.${{ needs.validate-build.outputs.version }}.nupkg` - Scriban template renderer
            - `Clywell.Core.Notifications.SignalR.${{ needs.validate-build.outputs.version }}.nupkg` - SignalR in-app channel
            - `Clywell.Core.Notifications.Sse.${{ needs.validate-build.outputs.version }}.nupkg` - Server-Sent Events in-app channel
            
            ### What's Changed
            Please review the commit history for details on changes in this release.
            
            ### Installation
            
            Core package (required):
            ```
            dotnet add package Clywell.Core.Notifications --version ${{ needs.validate-build.outputs.version }}
            ```
            
            SMTP email channel:
            ```
            dotnet add package Clywell.Core.Notifications.Smtp --version ${{ needs.validate-build.outputs.version }}
            ```
            
            Scriban template renderer:
            ```
            dotnet add package Clywell.Core.Notifications.Renderer.Scriban --version ${{ needs.validate-build.outputs.version }}
            ```
            
            SignalR in-app channel:
            ```
            dotnet add package Clywell.Core.Notifications.SignalR --version ${{ needs.validate-build.outputs.version }}
            ```
            
            Server-Sent Events in-app channel:
            ```
            dotnet add package Clywell.Core.Notifications.Sse --version ${{ needs.validate-build.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Release Summary
  # ============================================================
  release-summary:
    runs-on: ubuntu-latest
    name: Release Summary
    if: always()
    needs: [validate-build, package, publish-nuget, github-release]

    steps:
      - name: Generate summary
        run: |
          echo "Release Summary"
          echo "==============="
          echo "Version: ${{ needs.validate-build.outputs.version }}"
          echo "Package: ${{ needs.package.result }}"
          echo "NuGet Publish: ${{ needs.publish-nuget.result }}"
          echo "GitHub Release: ${{ needs.github-release.result }}"
          echo ""
          echo "✓ Release ${{ needs.validate-build.outputs.version }} complete!"
